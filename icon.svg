<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e7490;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)" stroke="#22d3ee" stroke-width="3" stroke-opacity="0.3"/>

  <!-- Subtle grid lines for tech feel -->
  <g opacity="0.06" stroke="#22d3ee" stroke-width="1">
    <line x1="256" y1="40" x2="256" y2="472"/>
    <line x1="40" y1="256" x2="472" y2="256"/>
    <line x1="108" y1="40" x2="108" y2="472"/>
    <line x1="404" y1="40" x2="404" y2="472"/>
    <line x1="40" y1="148" x2="472" y2="148"/>
    <line x1="40" y1="364" x2="472" y2="364"/>
  </g>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.15" filter="url(#glow)"/>

  <!-- Shield shape -->
  <path d="M256 88 L380 148 C380 148 388 280 356 340 C324 400 256 432 256 432 C256 432 188 400 156 340 C124 280 132 148 132 148 Z"
        fill="url(#shieldGrad)" fill-opacity="0.12" stroke="url(#shieldGrad)" stroke-width="3" filter="url(#glow)"/>

  <!-- Inner shield highlight -->
  <path d="M256 112 L362 164 C362 164 369 278 342 330 C315 382 256 410 256 410 C256 410 197 382 170 330 C143 278 150 164 150 164 Z"
        fill="none" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Lock body -->
  <rect x="224" y="248" width="64" height="52" rx="8" fill="#22d3ee" fill-opacity="0.9" filter="url(#innerGlow)"/>

  <!-- Lock shackle -->
  <path d="M234 248 L234 224 C234 204 244 192 256 192 C268 192 278 204 278 224 L278 248"
        fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" filter="url(#innerGlow)"/>

  <!-- Lock keyhole -->
  <circle cx="256" cy="268" r="7" fill="#0f172a"/>
  <rect x="253" y="270" width="6" height="14" rx="2" fill="#0f172a"/>

  <!-- Terminal cursor blinking lines (tech element) -->
  <g opacity="0.5" filter="url(#innerGlow)">
    <rect x="176" y="340" width="28" height="3" rx="1.5" fill="#22d3ee"/>
    <rect x="210" y="340" width="16" height="3" rx="1.5" fill="#22d3ee"/>

    <rect x="308" y="340" width="20" height="3" rx="1.5" fill="#22d3ee"/>
    <rect x="334" y="340" width="12" height="3" rx="1.5" fill="#22d3ee"/>

    <rect x="192" y="352" width="12" height="3" rx="1.5" fill="#22d3ee"/>
    <rect x="210" y="352" width="24" height="3" rx="1.5" fill="#22d3ee"/>

    <rect x="296" y="352" width="18" height="3" rx="1.5" fill="#22d3ee"/>
    <rect x="320" y="352" width="28" height="3" rx="1.5" fill="#22d3ee"/>
  </g>

  <!-- Small chevrons / bracket accents -->
  <g fill="none" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
    <!-- Left bracket -->
    <polyline points="148,230 134,260 148,290"/>
    <!-- Right bracket -->
    <polyline points="364,230 378,260 364,290"/>
  </g>
</svg>
