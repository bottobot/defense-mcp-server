name: Semgrep SAST

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: '30 6 * * 1'  # Weekly on Mondays at 06:30 UTC

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep@sha256:a3d49dc967b8534a6a76628e50c51cbfe33eb7195dc2feab1fdc0f100852c8ef # 1.156.0

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Semgrep
        run: semgrep scan --config auto --config p/security-audit --config p/nodejs --sarif --output results.sarif
        env:
          SEMGREP_RULES: p/default p/security-audit p/nodejs p/typescript

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@3b1a19a80ab047f35cbb237b5bd9bdc1e14f166c # v3
        if: always()
        with:
          sarif_file: results.sarif
