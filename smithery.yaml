# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
# Smithery reads this directly from GitHub — updates take effect automatically.

startCommand:
  type: stdio
  configSchema:
    type: object
    required: []
    properties:
      dryRun:
        type: boolean
        default: true
        description: Preview changes without applying them. Set to false to enable live modifications.
      autoInstall:
        type: boolean
        default: true
        description: Automatically install missing security tool dependencies via the system package manager.
      allowedDirs:
        type: string
        default: "/tmp,/home,/var/log"
        description: Comma-separated directories the server can access. Restricts file operations to these paths.
      logLevel:
        type: string
        default: "info"
        description: "Log verbosity: debug, info, warn, or error."
      backupEnabled:
        type: boolean
        default: true
        description: Automatically back up system state before any modifications.
    description: >-
      Defense MCP Server — 31 defensive security tools with 250+ actions for
      Linux system hardening, compliance auditing, and threat detection.
      Dry-run mode is on by default for safety.
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', 'defense-mcp-server'],
      env: {
        DEFENSE_MCP_DRY_RUN: String(config.dryRun ?? true),
        DEFENSE_MCP_AUTO_INSTALL: String(config.autoInstall ?? true),
        DEFENSE_MCP_ALLOWED_DIRS: config.allowedDirs || '/tmp,/home,/var/log',
        DEFENSE_MCP_LOG_LEVEL: config.logLevel || 'info',
        DEFENSE_MCP_BACKUP_ENABLED: String(config.backupEnabled ?? true)
      }
    })
